<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>RIT Internal Simplifier</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <!-- HEADER -->

    <header class="header">

        <h1>RIT Internal Simplifier</h1>

        <p>
           Hi guys, calculate your internal assessment marks
        </p>

    </header>



    <!-- CALCULATOR -->

    <main class="card">

        <h2>Internal Simplifier</h2>

        <p class="description">
            Calculate your RIT internal marks
        </p>


        <p class="pass-mark">
            Minimum internals (pass mark) = 23
        </p>


        <!-- ERROR -->

        <p id="error"></p>



        <!-- INPUTS -->

        <div class="inputs">


            <!-- CAT 1 -->

            <div class="input-group">

                <label for="cat1">
                    CAT 1 (0-50)
                </label>

                <input
                    id="cat1"
                    type="number"
                    min="0"
                    max="50"
                    step="1"
                    placeholder="Enter CAT 1 mark"
                >

            </div>



            <!-- CAT 2 -->

            <div class="input-group">

                <label for="cat2">
                    CAT 2 (0-25)
                </label>

                <input
                    id="cat2"
                    type="number"
                    min="0"
                    max="25"
                    step="1"
                    placeholder="Enter CAT 2 mark"
                >

            </div>



            <!-- CAT 3 -->

            <div class="input-group">

                <label for="cat3">
                    CAT 3 (0-50)
                </label>

                <input
                    id="cat3"
                    type="number"
                    min="0"
                    max="50"
                    step="1"
                    placeholder="Enter CAT 3 mark"
                >

            </div>



            <!-- ASSIGNMENT -->

            <div class="input-group">

                <label for="assignment">
                    Assignment (0-50)
                </label>

                <input
                    id="assignment"
                    type="number"
                    min="0"
                    max="50"
                    step="1"
                    placeholder="Enter assignment mark"
                >

            </div>


        </div>



        <!-- BUTTONS -->

        <div class="buttons">

            <button
                class="calculate-btn"
                onclick="calculate()">

                🧮 Calculate

            </button>


            <button
                class="reset-btn"
                onclick="resetCalc()">

                ↻ Reset

            </button>

        </div>



        <!-- RESULT -->

        <div class="result-section">

            <h2>Total Internal Marks:</h2>


            <div class="result-box">

                <h1 id="result">
                    0 / 40
                </h1>


                <h2 id="status"></h2>

            </div>

        </div>


    </main>



    <!-- FOOTER -->

    <footer>

        <p>
            RIT Internal Simplifier
        </p>

        <p>
            Made by Abishek
        </p>

    </footer>



    <!-- JAVASCRIPT -->

    <script src="script.js"></script>


</body>

</html>
